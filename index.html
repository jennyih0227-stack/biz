<div id="lockScreen" style="position:fixed;inset:0;background:linear-gradient(165deg,#1B2A4A,#0f1626);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="background:#1B2A4A;border:1px solid #C9A84C;border-radius:16px;padding:30px 24px;max-width:360px;width:100%;text-align:center;">

    <input id="pwInput" type="password" inputmode="numeric" placeholder="еҜҶзўј" style="width:100%;padding:13px;border-radius:10px;border:1px solid #2E4A7A;background:#0f1626;color:#fff;font-size:18px;text-align:center;letter-spacing:4px;margin-bottom:14px;" onkeydown="if(event.key==='Enter')tryUnlock()">
    <button onclick="tryUnlock()" style="width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(90deg,#C9A84C,#A07830);color:#1B2A4A;font-size:16px;font-weight:900;cursor:pointer;">йҖІе…Ҙ</button>

  </div>
</div>
<script>
const APP_PASSWORD = "1688";
function tryUnlock(){const v=document.getElementById('pwInput').value;
  if(v===APP_PASSWORD){document.getElementById('lockScreen').style.display='none';try{sessionStorage.setItem('unlocked','1');}catch(e){}}
  else{document.getElementById('pwErr').textContent='еҜҶзўјйҢҜиӘӨ';document.getElementById('pwInput').value='';}}
try{if(sessionStorage.getItem('unlocked')==='1'){document.addEventListener('DOMContentLoaded',()=>{var l=document.getElementById('lockScreen');if(l)l.style.display='none';});}}catch(e){}
</script>

const ZONES=["еӢҮдјҜеҚҖ","зҫҺж·‘еҚҖ","жҳҘзҫҺеҚҖ","ж·‘йҹ»еҚҖ","жҢҜжҜ…еҚҖ","йә—зҫҺеҚҖ","еҮұйӣҜеҚҖ","ж–ҮйҖІеҚҖ","е®ңеҗӣеҚҖ"];
const SEED=[];  // йғЁзҪІзүҲпјҡеҗҚе–®жё…з©ә
const LS='biz_data_v1';
let people=[], records=[], zoneQuota={}, zoneQuotaM={}; let editIdx=-1, curTab='org', impMode='org';
// еҗ„жңҲеҗ„еҚҖиІ¬д»»йЎҚпјҲе–®дҪҚпјҡиҗ¬е…ғпјүпјӢйҖҡиЁҠиҷ•ж ёе®ҡж•ё
const QUOTA_PRESET={
 7 :{hq:143, z:{еӢҮдјҜеҚҖ:29,зҫҺж·‘еҚҖ:29,жҳҘзҫҺеҚҖ:16,ж·‘йҹ»еҚҖ:5,жҢҜжҜ…еҚҖ:5,йә—зҫҺеҚҖ:5,еҮұйӣҜеҚҖ:21,ж–ҮйҖІеҚҖ:21,е®ңеҗӣеҚҖ:12}},
 8 :{hq:147, z:{еӢҮдјҜеҚҖ:30,зҫҺж·‘еҚҖ:30,жҳҘзҫҺеҚҖ:17,ж·‘йҹ»еҚҖ:5,жҢҜжҜ…еҚҖ:5,йә—зҫҺеҚҖ:5,еҮұйӣҜеҚҖ:21,ж–ҮйҖІеҚҖ:21,е®ңеҗӣеҚҖ:13}},
 9 :{hq:147, z:{еӢҮдјҜеҚҖ:30,зҫҺж·‘еҚҖ:30,жҳҘзҫҺеҚҖ:17,ж·‘йҹ»еҚҖ:5,жҢҜжҜ…еҚҖ:5,йә—зҫҺеҚҖ:5,еҮұйӣҜеҚҖ:21,ж–ҮйҖІеҚҖ:21,е®ңеҗӣеҚҖ:13}},
 10:{hq:150, z:{еӢҮдјҜеҚҖ:31,зҫҺж·‘еҚҖ:31,жҳҘзҫҺеҚҖ:18,ж·‘йҹ»еҚҖ:5,жҢҜжҜ…еҚҖ:5,йә—зҫҺеҚҖ:5,еҮұйӣҜеҚҖ:22,ж–ҮйҖІеҚҖ:22,е®ңеҗӣеҚҖ:13}},
 11:{hq:171, z:{еӢҮдјҜеҚҖ:35,зҫҺж·‘еҚҖ:35,жҳҘзҫҺеҚҖ:20,ж·‘йҹ»еҚҖ:6,жҢҜжҜ…еҚҖ:6,йә—зҫҺеҚҖ:6,еҮұйӣҜеҚҖ:25,ж–ҮйҖІеҚҖ:25,е®ңеҗӣеҚҖ:15}},
 12:{hq:205, z:{еӢҮдјҜеҚҖ:42,зҫҺж·‘еҚҖ:42,жҳҘзҫҺеҚҖ:24,ж·‘йҹ»еҚҖ:6,жҢҜжҜ…еҚҖ:6,йә—зҫҺеҚҖ:6,еҮұйӣҜеҚҖ:30,ж–ҮйҖІеҚҖ:30,е®ңеҗӣеҚҖ:18}},
};
// TOPжңғе“Ўй–ҖжӘ»
const TOP_CNT=4, TOP_FYC=20000;
let qMonth=7; // иІ¬д»»йЎҚеҲҶй Ғзӣ®еүҚжңҲд»Ҫ
let filterMode='month'; // today|month|range|work
let rangeFrom='', rangeTo='';
let workFrom='', workTo=''; // е·ҘдҪңжңҲиө·иЁ–пјҲжүӢеӢ•иЁӯпјү
let topN=5, lastRank={title:'',items:[]};

function todayStr(){return new Date().toISOString().slice(0,10);}
function monthStart(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01';}
function load(){
  try{const s=JSON.parse(localStorage.getItem(LS));if(s){people=s.people||[];records=s.records||[];zoneQuota=s.zoneQuota||{};zoneQuotaM=s.zoneQuotaM||{};if(s.workFrom)workFrom=s.workFrom;if(s.workTo)workTo=s.workTo;}}catch(e){}
  if(!people.length){people=SEED.map(([z,g,n])=>({zone:z,group:g,name:n,title:'',active:true}));}
  // еҗ‘дёӢзӣёе®№пјҡиЈң active
  people.forEach(p=>{ if(p.active===undefined)p.active=true; });
  // й җе»әеҗ„жңҲиІ¬д»»йЎҚпјҲиҗ¬е…ғпјүпјҚиӢҘи©ІжңҲе°ҡз„ЎиіҮж–ҷжүҚеЎ«й җиЁӯ
  [7,8,9,10,11,12].forEach(mk=>{
    if(!zoneQuotaM[mk]){const pr=QUOTA_PRESET[mk];zoneQuotaM[mk]={hq:pr.hq,z:{...pr.z}};}
  });
  save();
}
function save(){try{localStorage.setItem(LS,JSON.stringify({people,records,zoneQuota,zoneQuotaM,workFrom,workTo}));}catch(e){}}
function autoGroup(name){return name&&name.length>1?name.slice(1)+'зө„':(name?name+'зө„':'');}
function isLeader(p){const key=p.group.endsWith('зө„')?p.group.slice(0,-1):p.group;return p.name.slice(1)===key||p.name===key;}
function zoneOrder(){const zs=new Set(people.map(p=>p.zone));return[...ZONES.filter(z=>zs.has(z)),...[...zs].filter(z=>!ZONES.includes(z))];}
function findP(name){return people.find(p=>p.name===name);}

function switchTab(v){
  curTab=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  document.getElementById('orgTop').classList.toggle('hidden',v!=='org');
  document.getElementById('viewOrg').classList.toggle('hidden',v!=='org');
  document.getElementById('viewPerf').classList.toggle('hidden',v!=='perf');
  document.getElementById('viewMatrix').classList.toggle('hidden',v!=='matrix');
  document.getElementById('viewRank').classList.toggle('hidden',!(v.startsWith('r')));
  document.getElementById('viewQuota').classList.toggle('hidden',v!=='quota');
  document.getElementById('viewZone').classList.toggle('hidden',v!=='zone');
  document.getElementById('viewTop').classList.toggle('hidden',v!=='top');
  if(v==='org')renderOrg();
  else if(v==='perf')renderPerf();
  else if(v==='matrix')renderMatrix();
  else if(v==='quota')renderQuota();
  else if(v==='zone')renderZone();
  else if(v==='top')renderTop();
  else renderRank(v);
}

/* ---- зө„з№”иЎЁ ---- */
function renderStat(){
  const groups=new Set(people.map(p=>p.zone+'/'+p.group));
  const zoneset=new Set(people.map(p=>p.zone));
  document.getElementById('stat').innerHTML=
    `<div class="chip">йҖҡиЁҠиҷ• <b>${people.length}</b> дәә</div><div class="chip"><b>${zoneset.size}</b> еҚҖ</div><div class="chip"><b>${groups.size}</b> зө„</div><div class="chip">жҘӯзёҫ <b>${records.length}</b> зӯҶ</div>`;
  document.getElementById('jump').innerHTML=zoneOrder().map(z=>`<button class="jbtn" onclick="jumpZone('${z}')">${z}</button>`).join('');
}
function jumpZone(z){const el=document.getElementById('zone-'+z);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function renderOrg(){
  renderStat();
  let h='';
  zoneOrder().forEach(z=>{
    const ps=people.map((p,i)=>({...p,i})).filter(p=>p.zone===z);
    h+=`<div class="zone" id="zone-${z}"><div class="zhead"><span>${z}</span><span class="cnt">${ps.length} дәә</span></div>`;
    ps.forEach(p=>{
      const lead=isLeader(p);
      if(lead){
        // зө„й•·пјҡеҲ—дёҠиҒ·зҙҡдёӢжӢү
        const t=p.title||'';
        const sel=`<select class="titlesel" onchange="setTitle(${p.i},this.value)">
          <option value=""${t===''?' selected':''}>иҒ·зҙҡ</option>
          <option value="з¶“зҗҶ"${t==='з¶“зҗҶ'?' selected':''}>з¶“зҗҶ</option>
          <option value="иҘ„зҗҶ"${t==='иҘ„зҗҶ'?' selected':''}>иҘ„зҗҶ</option>
          <option value="дё»д»»"${t==='дё»д»»'?' selected':''}>дё»д»»</option></select>`;
        h+=`<div class="prow"><span class="grp">${p.group}</span><span class="nm">${p.name}</span>
          ${sel}<span class="act"><button class="b-edit" onclick="openEdit(${p.i})">вңҺ</button><button class="b-del" onclick="delP(${p.i})">рҹ—‘</button></span></div>`;
      }else{
        // жҘӯд»ЈпјҡеҲ—дёҠеҮәеӢӨеӢҫйҒё
        const on=p.active!==false;
        const chk=`<span class="chk ${on?'on':''}" onclick="toggleActive(${p.i})">${on?'вң“еҮәеӢӨ':'жңӘеҮәеӢӨ'}</span>`;
        h+=`<div class="prow ${on?'':'off'}"><span class="grp">${p.group}</span><span class="nm">${p.name}</span>
          ${chk}<span class="act"><button class="b-edit" onclick="openEdit(${p.i})">вңҺ</button><button class="b-del" onclick="delP(${p.i})">рҹ—‘</button></span></div>`;
      }
    });
    h+='</div>';
  });
  document.getElementById('viewOrg').innerHTML=h||'<div class="panel">е°ҡз„ЎиіҮж–ҷгҖӮ</div>';
}

/* ---- жҘӯзёҫжҳҺзҙ° ---- */
function renderPerf(){
  const box=document.getElementById('viewPerf');
  let h='<div class="panel"><h1>жҘӯзёҫжҳҺзҙ°</h1>'+
    '<div class="bar" style="margin-bottom:12px"><button class="b-add" onclick="openAddPerf()">пјӢ ж–°еўһжҘӯзёҫ</button>'+

    sorted.forEach(r=>{
      h+=`<div class="perfrow"><span class="d">${r.date}</span><span class="n">${r.name}</span><span class="c">${r.cnt}</span><span class="a">${(r.amt||0).toLocaleString()}</span><span class="x" onclick="delPerf(${r.i})">вң•</span></div>`;

function openAddPerf(){
  const sel=document.getElementById('pName');sel.innerHTML='';
  people.forEach(p=>{const o=document.createElement('option');o.value=p.name;o.textContent=p.name+'пјҲ'+p.zone+'пјү';sel.appendChild(o);});
  document.getElementById('pDate').value=todayStr();document.getElementById('pCnt').value=1;document.getElementById('pAmt').value='';
  document.getElementById('perfModal').classList.add('show');
}
function closePerf(){document.getElementById('perfModal').classList.remove('show');}
function savePerf(){
  const date=document.getElementById('pDate').value;const name=document.getElementById('pName').value;
  const cnt=parseFloat(document.getElementById('pCnt').value)||0;const amt=parseFloat(document.getElementById('pAmt').value)||0;
  if(!date||!name){alert('и«ӢйҒёж—ҘжңҹиҲҮе§“еҗҚ');return;}
  records.push({date,name,cnt,amt});save();renderPerf();closePerf();
}
function delPerf(i){if(confirm('еҲӘйҷӨйҖҷзӯҶжҘӯзёҫпјҹ')){records.splice(i,1);save();renderPerf();}}

/* ---- жҺ’еҗҚпјҲж—ҘжңҹзҜ©йҒёпјү---- */
function inRange(d){
  if(filterMode==='today')return d===todayStr();
  if(filterMode==='month')return d>=monthStart()&&d<=todayStr().slice(0,8)+'31';
  if(filterMode==='range')return (!rangeFrom||d>=rangeFrom)&&(!rangeTo||d<=rangeTo);
  if(filterMode==='work')return (!workFrom||d>=workFrom)&&(!workTo||d<=workTo);
  return true;
}
function filterLabel(){
  if(filterMode==='today')return 'з•¶ж—ҘпјҲ'+todayStr()+'пјү';
  if(filterMode==='month')return 'з•¶жңҲпјҲ'+monthStart().slice(0,7)+'пјү';
  if(filterMode==='work')return 'е·ҘдҪңжңҲпјҲ'+(workFrom||'иө·')+' ~ '+(workTo||'иҝ„')+'пјү';
  return 'жңҹй–“ '+(rangeFrom||'иө·')+' ~ '+(rangeTo||'иҝ„');
}
function aggByName(){
  const m={};
  records.filter(r=>inRange(r.date)).forEach(r=>{
    if(!m[r.name])m[r.name]={amt:0,cnt:0};m[r.name].amt+=(r.amt||0);m[r.name].cnt+=(r.cnt||0);
  });
  return m;
}
function renderRank(kind){
  const box=document.getElementById('viewRank');
  const agg=aggByName();
  let title,desc,items;
  if(kind==='rPerson'){
    title='еҖӢдәәжҺ’еҗҚ';desc='е…ЁйҖҡиЁҠиҷ•жҜҸдәәдҫқйҮ‘йЎҚжҺ’пјҲжңӘеҮәеӢӨиҖ…дёҚеҲ—е…ҘпјүгҖӮ';
    items=people.filter(p=>p.active!==false).map(p=>({name:p.name,sub:p.zone+' В· '+p.group,amt:agg[p.name]?.amt||0,cnt:agg[p.name]?.cnt||0,
      isTop:(agg[p.name]?.cnt||0)>=TOP_CNT&&(agg[p.name]?.amt||0)>=TOP_FYC}));
  }else if(kind==='rGroup'){
    title='зө„жҺ’еҗҚ';desc='д»Ҙзө„зӮәе–®дҪҚпјқзө„й•·пјӢзө„е“ЎеҗҲиЁҲгҖӮ';
    const m={};
    people.forEach(p=>{const k=p.zone+'/'+p.group;if(!m[k])m[k]={name:p.group,sub:p.zone,amt:0,cnt:0,ppl:0};
      m[k].amt+=agg[p.name]?.amt||0;m[k].cnt+=agg[p.name]?.cnt||0;m[k].ppl++;});
    items=Object.values(m).map(g=>({...g,sub:g.sub+' В· '+g.ppl+' дәә'}));
  }else{
    title='жҘӯеӢҷд»ЈиЎЁжҺ’еҗҚ';desc='еғ…иЁҲзө„е“ЎпјҲйқһзө„й•·пјүпјҢжңӘеҮәеӢӨиҖ…дёҚеҲ—е…ҘгҖӮ';
    items=people.filter(p=>!isLeader(p)&&p.active!==false).map(p=>({name:p.name,sub:p.zone+' В· '+p.group,amt:agg[p.name]?.amt||0,cnt:agg[p.name]?.cnt||0}));
  }
  items.sort((a,b)=>b.amt-a.amt);
  let h='<div class="panel"><h1>'+title+'</h1>';
  // ж—ҘжңҹзҜ©йҒёеҲ—
  h+='<div class="filter">'+
     `<button class="fbtn ${filterMode==='today'?'active':''}" onclick="setFilter('today')">з•¶ж—Ҙ</button>`+
     `<button class="fbtn ${filterMode==='month'?'active':''}" onclick="setFilter('month')">з•¶жңҲ</button>`+
     `<button class="fbtn ${filterMode==='work'?'active':''}" onclick="setFilter('work')">е·ҘдҪңжңҲ</button>`+
     `<button class="fbtn ${filterMode==='range'?'active':''}" onclick="setFilter('range')">иҮӘиЁӮжңҹй–“</button></div>`;
  if(filterMode==='range'){
    h+=`<div class="daterange"><input type="date" id="rFrom" value="${rangeFrom}" onchange="rangeFrom=this.value;renderRank('${kind}')">`+
       `<span>~</span><input type="date" id="rTo" value="${rangeTo}" onchange="rangeTo=this.value;renderRank('${kind}')"></div>`;
  }
  if(filterMode==='work'){
    h+=`<div class="daterange"><span style="color:#C9A84C;font-size:12px">е·ҘдҪңжңҲиө·иЁ–</span><input type="date" value="${workFrom}" onchange="workFrom=this.value;save();renderRank('${kind}')">`+
       `<span>~</span><input type="date" value="${workTo}" onchange="workTo=this.value;save();renderRank('${kind}')"></div>`;
  }
  h+='<div class="rankhint">'+desc+'гҖҖзӣ®еүҚзҜ„еңҚпјҡ<b>'+filterLabel()+'</b></div>';
  // еҮәең–жҺ§еҲ¶
  h+='<div class="filter" style="margin-bottom:8px">'+
     '<span style="color:#9fb0cc;font-size:13px;align-self:center">еҮәең–дәәж•ёпјҡ</span>'+
     `<button class="fbtn ${topN===3?'active':''}" onclick="setTopN(3)">еүҚ3</button>`+
     `<button class="fbtn ${topN===5?'active':''}" onclick="setTopN(5)">еүҚ5</button>`+
     `<button class="fbtn ${topN===10?'active':''}" onclick="setTopN(10)">еүҚ10</button>`+
     `<button class="fbtn ${topN===999?'active':''}" onclick="setTopN(999)">е…ЁйғЁ</button></div>`;
  h+='<div class="bar" style="margin-bottom:10px"><button class="b-ok" style="flex:1;padding:13px;border-radius:10px;border:none;font-weight:700;cursor:pointer" onclick="makeRankImage()">в¬Ү з”ўз”ҹжҺ’еҗҚең–пјҲд№ӢеҫҢй•·жҢүе„Іеӯҳпјү</button></div>';
  h+='<div id="rankResult" class="result"></div>';
  const hasData=items.some(x=>x.amt>0);
  if(!hasData)h+='<div class="emptyhint">жӯӨзҜ„еңҚе°ҡз„ЎжҘӯзёҫиіҮж–ҷгҖӮ</div>';
  items.forEach((it,i)=>{
    const cls=it.amt>0?(i===0?'top1':i===1?'top2':i===2?'top3':''):'';
    h+=`<div class="rrow ${cls}"><div class="rk">${i+1}</div>
      <div class="who"><div class="n">${it.name}${it.isTop?' <span class="badge" style="background:rgba(201,168,76,.25);color:#E0C868;border:1px solid #C9A84C">TOP</span>':''}</div><div class="s">${it.sub}</div></div>
      <div class="val"><div class="a">${it.amt.toLocaleString()}</div><div class="c">${it.cnt} д»¶</div></div></div>`;
  });
  h+='</div>';
  box.innerHTML=h;
  lastRank={title,items};
}
function setTopN(n){topN=n;renderRank(curTab);}
function setFilter(m){filterMode=m;
  if(m==='range'&&!rangeFrom){rangeFrom=monthStart();rangeTo=todayStr();}
  if(m==='work'&&!workFrom){const d=new Date();const y=d.getFullYear(),mo=d.getMonth();
    workFrom=new Date(y,mo-1,25).toISOString().slice(0,10);workTo=new Date(y,mo,24).toISOString().slice(0,10);save();}
  renderRank(curTab);}

/* ---- иІ¬д»»йЎҚпјҲжңҲд»ҪеҲ¶пјӣиІ¬д»»йЎҚиҗ¬е…ғгҖҒйҒ”жҲҗе…ғпјҢеҗ„йЎҜеҗ„зҡ„пјү---- */
function qMonthRange(mk){ // йҒ”жҲҗзөұиЁҲеҚҖй–“пјқе·ҘдҪңжңҲиө·иЁ–пјҲиҲҮеҗ„еҚҖжҘӯзёҫдёҖиҮҙпјүпјӣжңӘиЁӯеүҮйҖҖеӣһи©ІжңҲиҮӘз„¶жңҲ
  if(workFrom&&workTo)return [workFrom,workTo];
  const y=new Date().getFullYear();
  const mm=String(mk).padStart(2,'0');
  const last=new Date(y,mk,0).getDate();
  return [`${y}-${mm}-01`,`${y}-${mm}-${last}`];
}
function zoneAchieveByMonth(mk){ // еҗ„еҚҖйҒ”жҲҗйҮ‘йЎҚпјҲе…ғпјүпјҢдҫқе·ҘдҪңжңҲиө·иЁ–
  const [a,b]=qMonthRange(mk);
  const m={};
  records.filter(r=>r.date>=a&&r.date<=b).forEach(r=>{
    const p=findP(r.name); if(!p)return;
    m[p.zone]=(m[p.zone]||0)+(r.amt||0);
  });
  return m;
}
function setQMonth(mk){qMonth=mk;renderQuota();}
function setQuotaM(zone,val){if(!zoneQuotaM[qMonth])zoneQuotaM[qMonth]={hq:0,z:{}};zoneQuotaM[qMonth].z[zone]=parseFloat(val)||0;save();renderQuota();}

/* ---- еҗ„еҚҖжҘӯзёҫпјҲеҗ„еҚҖжҲҗе“ЎжҘӯзёҫпјӢеҗ„еҚҖзёҪжҘӯзёҫпјү---- */
let zoneFilterMode='month';
function zInRange(d){
  if(zoneFilterMode==='today')return d===todayStr();
  if(zoneFilterMode==='month')return d>=monthStart()&&d<=todayStr().slice(0,8)+'31';
  if(zoneFilterMode==='work')return (!workFrom||d>=workFrom)&&(!workTo||d<=workTo);
  if(zoneFilterMode==='range')return (!rangeFrom||d>=rangeFrom)&&(!rangeTo||d<=rangeTo);
  return true;
}
function zLabel(){
  if(zoneFilterMode==='today')return 'з•¶ж—ҘпјҲ'+todayStr()+'пјү';
  if(zoneFilterMode==='month')return 'з•¶жңҲпјҲ'+monthStart().slice(0,7)+'пјү';
  if(zoneFilterMode==='work')return 'е·ҘдҪңжңҲпјҲ'+(workFrom||'иө·')+' ~ '+(workTo||'иҝ„')+'пјү';
  return 'жңҹй–“ '+(rangeFrom||'иө·')+' ~ '+(rangeTo||'иҝ„');
}
function zAgg(){
  const m={};
  records.filter(r=>zInRange(r.date)).forEach(r=>{
    if(!m[r.name])m[r.name]={amt:0,cnt:0};m[r.name].amt+=(r.amt||0);m[r.name].cnt+=(r.cnt||0);

  const medals=['рҹҘҮ','рҹҘҲ','рҹҘү'];let yy=headH;
  items.forEach((it,i)=>{const top3=i<3;
    ctx.fillStyle=top3?'rgba(201,168,76,.16)':'rgba(250,246,238,.06)';rr2(ctx,left,yy,tableW,rowH-16,14);ctx.fill();
    ctx.fillStyle=i===0?'#FFD24A':i===1?'#D8D8D8':i===2?'#E0995A':'#C9A84C';rr2(ctx,left,yy,9,rowH-16,5);ctx.fill();
    const midY=yy+(rowH-16)/2;ctx.textBaseline='middle';ctx.textAlign='center';
    if(top3){ctx.font='52px '+SANS;ctx.fillText(medals[i],left+58,midY);}
    else{ctx.fillStyle='#9fb0cc';ctx.font='900 44px '+SERIF;ctx.fillText(String(i+1),left+58,midY);}
    ctx.textAlign='left';ctx.fillStyle='#FAF6EE';ctx.font='700 48px '+SANS;ctx.fillText(it.name,left+120,midY-14);
    ctx.fillStyle='#9fb0cc';ctx.font='26px '+SANS;ctx.fillText(it.sub,left+120,midY+30);
    ctx.textAlign='center';ctx.fillStyle='#C9A84C';ctx.font='900 46px '+SERIF;ctx.fillText(it.amt.toLocaleString(),colAmt,midY);
    ctx.fillStyle='#9fc4ff';ctx.font='700 40px '+SERIF;ctx.fillText(String(it.cnt),colCnt,midY);
    ctx.textBaseline='alphabetic';yy+=rowH;});
  ctx.textAlign='center';ctx.fillStyle='#C9A84C';ctx.font='32px '+SERIF;ctx.fillText('йҪҠеҝғ В· иЎқеҲә В· е…ұжҰ®',W/2,H-58);
  const url=cv.toDataURL('image/png');
  document.getElementById('topResult').innerHTML='<img src="'+url+'" alt="TOPжңғе“Ўең–"><div class="tip">вҶ‘ й•·жҢүйҖҷејөең– вҶ’ еҠ е…Ҙз…§зүҮ / е„ІеӯҳеҪұеғҸ</div>';
}

/* ---- жҜҸж—ҘжҘӯзёҫзҹ©йҷЈпјҲе…ұз”Ё recordsпјү---- */
let mxMonth='', mxMode='people', mxPage=0, mxPer=10, mxEdit=null;
function mxPad(n){return String(n).padStart(2,'0');}
function mxDays(ym){const [y,m]=ym.split('-').map(Number);return new Date(y,m,0).getDate();}
function mxMonthDates(ym){const n=mxDays(ym);const a=[];for(let d=1;d<=n;d++)a.push(ym+'-'+mxPad(d));return a;}
function mxWeek(ds){const d=new Date(ds+'T00:00:00');return ['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'][d.getDay()];}
function mxMD(ds){const[y,m,d]=ds.split('-');return Number(m)+'/'+Number(d);}
function mxGetCell(name,date){return records.find(r=>r.name===name&&r.date===date);}
const ZCOLORS={'еӢҮдјҜеҚҖ':'#3a5a92','зҫҺж·‘еҚҖ':'#7a4a8a','жҳҘзҫҺеҚҖ':'#2e7d5b','ж·‘йҹ»еҚҖ':'#8a6a3a','жҢҜжҜ…еҚҖ':'#9a4a4a','йә—зҫҺеҚҖ':'#4a7a8a','еҮұйӣҜеҚҖ':'#6a5a9a','ж–ҮйҖІеҚҖ':'#8a7a3a','е®ңеҗӣеҚҖ':'#3a7a6a'};
function mxZoneColor(name){const p=findP(name);return p?(ZCOLORS[p.zone]||'#1B2A4A'):'#1B2A4A';}
function mxSetCell(name,date,amt,cnt){
  let r=mxGetCell(name,date);
  if(amt===0&&cnt===0){ if(r)records=records.filter(x=>!(x.name===name&&x.date===date)); }
  else if(r){r.amt=amt;r.cnt=cnt;} else records.push({date,name,cnt,amt});
  save();
}
function mxTotalPages(){
  const dates=mxMonthDates(mxMonth);
  if(mxMode==='people')return Math.max(1,Math.ceil(people.length/mxPer));
  return Math.max(1,Math.ceil(dates.length/mxPer));
}
function renderMatrix(){
  const box=document.getElementById('viewMatrix');
  if(!mxMonth)mxMonth=todayStr().slice(0,7);
  let h='<div class="panel"><h1>жҜҸж—ҘжҘӯзёҫиЎЁ</h1>';
  // е·Ҙе…·еҲ—
  h+='<div class="mxtools">'+
     `<div class="seg"><button class="${mxMode==='people'?'on':''}" onclick="mxSetMode('people')">дәәеҗҚеҲҶй Ғ</button><button class="${mxMode==='date'?'on':''}" onclick="mxSetMode('date')">ж—ҘжңҹеҲҶй Ғ</button></div>`+
     `<label style="font-size:12px;color:#9fb0cc">жңҲд»Ҫ</label><input type="month" value="${mxMonth}" onchange="mxMonth=this.value;mxPage=0;renderMatrix()">`+
     `<label style="font-size:12px;color:#9fb0cc">жҜҸй Ғ</label><select onchange="mxPer=+this.value;mxPage=0;renderMatrix()">`+
       [5,10,15,20].map(n=>`<option value="${n}" ${n===mxPer?'selected':''}>${n}</option>`).join('')+`</select>`+
     `</div>`;
  // еҲҶй ҒеҷЁ
  const tp=mxTotalPages();
  h+=`<div class="mxpager"><button onclick="mxGo(-1)" ${mxPage<=0?'disabled':''}>вҖ№</button>`+
     `<span class="pg">${mxPage+1} / ${tp}</span><button onclick="mxGo(1)" ${mxPage>=tp-1?'disabled':''}>вҖә</button>`+
     `<span style="font-size:12px;color:#7d8fad;margin-left:8px">й»һж јеӯҗеҸҜеЎ«пјҸж”№ FYC иҲҮд»¶ж•ё</span></div>`;
  // иЎЁж ј
  const dates=mxMonthDates(mxMonth);
  let pp=people.map(p=>p.name), showDates=dates;
  if(mxMode==='people'){const s=mxPage*mxPer;pp=pp.slice(s,s+mxPer);}
  else{const s=mxPage*mxPer;showDates=dates.slice(s,s+mxPer);}
  h+='<div class="mxwrap"><table class="mxtable"><thead><tr><th class="corner">е§“еҗҚпјјж—Ҙжңҹ</th>';
  showDates.forEach(d=>{h+=`<th>${mxMD(d)}<span class="wd">йҖұ${mxWeek(d)}</span></th>`;});
  h+='<th class="sum">жң¬жңҲFYC<span class="wd">д»¶ж•ё</span></th></tr></thead><tbody>';
  const colSum={},colCnt={};showDates.forEach(d=>{colSum[d]=0;colCnt[d]=0;});
  pp.forEach(name=>{
    let mA=0,mC=0;dates.forEach(d=>{const r=mxGetCell(name,d);if(r){mA+=r.amt;mC+=r.cnt;}});
    h+=`<tr><th class="namec" style="background:${mxZoneColor(name)}">${name}</th>`;
    showDates.forEach(d=>{const r=mxGetCell(name,d);
      if(r){colSum[d]+=r.amt;colCnt[d]+=r.cnt;
        h+=`<td class="cell has" onclick="mxOpen('${name}','${d}')"><span class="fyc">${(r.amt||0).toLocaleString()}</span><span class="cnt">${r.cnt}д»¶</span></td>`;
      }else h+=`<td class="cell empty" onclick="mxOpen('${name}','${d}')">В·</td>`;
    });
    h+=`<td class="sumc">${mA.toLocaleString()}<span class="c">${mC}д»¶</span></td></tr>`;
  });
  h+='</tbody><tfoot><tr><th class="namec">'+(mxMode==='date'?'е…Ёе“ЎжҜҸж—ҘеҗҲиЁҲ':'жң¬й ҒжҜҸж—ҘеҗҲиЁҲ')+'</th>';
  const footPeople=mxMode==='date'?people.map(p=>p.name):pp;
  const fS={},fC={};showDates.forEach(d=>{fS[d]=0;fC[d]=0;});
  footPeople.forEach(name=>{showDates.forEach(d=>{const r=mxGetCell(name,d);if(r){fS[d]+=r.amt;fC[d]+=r.cnt;}});});
  let gA=0,gC=0;records.forEach(r=>{if(r.date>=mxMonth+'-01'&&r.date<=mxMonth+'-31'){gA+=r.amt;gC+=r.cnt;}});
  showDates.forEach(d=>{h+=`<td>${fS[d].toLocaleString()}<span class="c">${fC[d]}д»¶</span></td>`;});
  h+=`<td class="grand">${gA.toLocaleString()}<span class="c">${gC}д»¶</span></td></tr></tfoot></table></div>`;
  h+='</div>';
  box.innerHTML=h;
}
function mxSetMode(m){mxMode=m;mxPage=0;renderMatrix();}
function mxGo(d){const tp=mxTotalPages();mxPage=Math.min(Math.max(0,mxPage+d),tp-1);renderMatrix();}
function mxOpen(name,date){
  mxEdit={name,date};const r=mxGetCell(name,date);
  document.getElementById('mxWho').textContent=name+'гҖҖ'+date+'пјҲйҖұ'+mxWeek(date)+'пјү';
  document.getElementById('mxFyc').value=r?r.amt:'';
  document.getElementById('mxCnt').value=r?r.cnt:'';
  document.getElementById('mxModal').classList.add('show');
  setTimeout(()=>document.getElementById('mxFyc').focus(),50);
}
function mxClose(){document.getElementById('mxModal').classList.remove('show');mxEdit=null;}
function mxSave(){
  if(!mxEdit)return;
  const amt=parseFloat(document.getElementById('mxFyc').value)||0;
  const cnt=parseFloat(document.getElementById('mxCnt').value)||0;
  mxSetCell(mxEdit.name,mxEdit.date,amt,cnt);mxClose();renderMatrix();
}

/* ---- з·ЁијҜдәәе“Ў ---- */
function fillZoneSelect(sel){const s=document.getElementById('fZone');s.innerHTML='';
  [...new Set([...ZONES,...people.map(p=>p.zone)])].forEach(z=>{const o=document.createElement('option');o.value=z;o.textContent=z;if(z===sel)o.selected=true;s.appendChild(o);});}
function openAdd(){editIdx=-1;document.getElementById('editTitle').textContent='ж–°еўһдәәе“Ў';fillZoneSelect(ZONES[0]);
  document.getElementById('fGroup').value='';document.getElementById('fName').value='';document.getElementById('fTitle').value='';document.getElementById('editModal').classList.add('show');}
function openEdit(i){editIdx=i;const p=people[i];document.getElementById('editTitle').textContent='з·ЁијҜдәәе“Ў';fillZoneSelect(p.zone);
  document.getElementById('fGroup').value=p.group;document.getElementById('fName').value=p.name;document.getElementById('fTitle').value=p.title||'';document.getElementById('editModal').classList.add('show');}
function closeEdit(){document.getElementById('editModal').classList.remove('show');}
function saveEdit(){const z=document.getElementById('fZone').value;const name=document.getElementById('fName').value.trim();
  if(!name){alert('и«Ӣијёе…Ҙе§“еҗҚ');return;}let g=document.getElementById('fGroup').value.trim();if(!g)g=autoGroup(name);
  const title=document.getElementById('fTitle').value;
  const rec={zone:z,group:g,name:name,title:title};
  if(editIdx<0)people.push(rec);else people[editIdx]=rec;save();renderOrg();closeEdit();}
function delP(i){if(confirm('еҲӘйҷӨгҖҢ'+people[i].name+'гҖҚпјҹ')){people.splice(i,1);save();renderOrg();}}
function toggleActive(i){people[i].active=!(people[i].active!==false);save();renderOrg();}
function setTitle(i,val){people[i].title=val;save();renderOrg();}

/* ---- еҢҜе…Ҙ/еҢҜеҮә ---- */
function openImport(mode){impMode=mode;
  if(mode==='org'){document.getElementById('impTitle').textContent='еҢҜе…ҘеҗҚе–®';
    document.getElementById('impNote').textContent='иІјдёҠеӮҷд»Ҫ(JSON)пјҢжҲ–жҜҸиЎҢгҖҢеҚҖ,зө„,е§“еҗҚгҖҚгҖӮеҢҜе…ҘжңғеҸ–д»ЈеҗҚе–®гҖӮ';
    document.getElementById('impText').placeholder='еӢҮдјҜеҚҖ,е°ҸжҳҺзө„,зҺӢе°ҸжҳҺ\nзҫҺж·‘еҚҖ,зҫҺзҫҺзө„,жқҺзҫҺзҫҺ';
    document.getElementById('impFmt').textContent='е»әиӯ°е…ҲеҢҜеҮәеӮҷд»ҪгҖӮ';
  }else{document.getElementById('impTitle').textContent='еҢҜе…ҘжҘӯзёҫ';
    document.getElementById('impNote').textContent='жҜҸиЎҢгҖҢж—Ҙжңҹ,е§“еҗҚ,д»¶ж•ё,йҮ‘йЎҚгҖҚгҖӮжңғгҖҢзҙҜеҠ гҖҚеҲ°зҸҫжңүжҘӯзёҫгҖӮ';
    document.getElementById('impText').placeholder='2026-07-01,зҺӢе°ҸжҳҺ,2,50000\n2026-07-01,жқҺзҫҺзҫҺ,1,30000';
    document.getElementById('impFmt').textContent='ж—Ҙжңҹж јејҸ YYYY-MM-DDгҖӮе§“еҗҚй ҲиҲҮеҗҚе–®дёҖиҮҙгҖӮ';
  }
  document.getElementById('impText').value='';document.getElementById('impModal').classList.add('show');}
function closeImport(){document.getElementById('impModal').classList.remove('show');}
function doImport(){
  const t=document.getElementById('impText').value.trim();if(!t){alert('и«ӢиІјдёҠе…§е®№');return;}
  if(impMode==='org'){
    let arr=null;
    try{const j=JSON.parse(t);if(Array.isArray(j))arr=j.map(o=>({zone:o.zone,group:o.group||autoGroup(o.name),name:o.name,title:o.title||'',active:o.active!==false}));
      else if(j.people){arr=j.people.map(o=>({...o,active:o.active!==false}));if(j.records)records=j.records;if(j.zoneQuota)zoneQuota=j.zoneQuota;}}catch(e){}
    if(!arr){arr=[];t.split(/\r?\n/).forEach(line=>{const c=line.split(',').map(s=>s.trim());
      if(c.length>=3&&c[2])arr.push({zone:c[0],group:c[1]||autoGroup(c[2]),name:c[2],title:'',active:true});});}
    if(!arr.length){alert('и®ҖдёҚеҲ°жңүж•ҲиіҮж–ҷ');return;}
    if(!confirm('е°Үд»Ҙ '+arr.length+' зӯҶеҸ–д»ЈеҗҚе–®пјҢзўәе®ҡпјҹ'))return;
    people=arr;save();renderOrg();closeImport();
  }else{
    const add=[];
    t.split(/\r?\n/).forEach(line=>{const c=line.split(',').map(s=>s.trim());
      if(c.length>=4&&c[1]){add.push({date:c[0],name:c[1],cnt:parseFloat(c[2])||0,amt:parseFloat(c[3].replace(/,/g,''))||0});}});
    if(!add.length){alert('и®ҖдёҚеҲ°жңүж•ҲиіҮж–ҷ');return;}
    if(!confirm('е°Үж–°еўһ '+add.length+' зӯҶжҘӯзёҫпјҢзўәе®ҡпјҹ'))return;
    records=records.concat(add);save();renderPerf();closeImport();
  }
}
function exportAll(){const data=JSON.stringify({people,records,zoneQuota});dl(data,'жҘӯеӢҷзі»зөұеӮҷд»Ҫ_'+todayStr()+'.json');
  document.getElementById('impText').value=data;alert('е·Із”ўз”ҹе®Ңж•ҙеӮҷд»ҪгҖӮиӢҘжңӘи·ідёӢијүпјҢеҸҜй–ӢеҢҜе…ҘжЎҶй•·жҢүиӨҮиЈҪгҖӮ');}
function exportPerf(){const lines=['ж—Ҙжңҹ,е§“еҗҚ,д»¶ж•ё,йҮ‘йЎҚ'].concat(records.map(r=>`${r.date},${r.name},${r.cnt},${r.amt}`));
  dl(lines.join('\n'),'жҘӯзёҫжҳҺзҙ°_'+todayStr()+'.csv');alert('е·ІеҢҜеҮәжҘӯзёҫ CSVгҖӮ');}
function dl(text,fname){const blob=new Blob([text],{type:'text/plain'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();}

/* ===== жҺ’еҗҚеҮәең–пјҲзҙ”Canvasйӣўз·ҡпјү===== */
const SERIF='"PingFang TC","Songti TC","Heiti TC",serif';
const SANS='"PingFang TC","Heiti TC",sans-serif';
function rr2(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function makeRankImage(){
  const all=lastRank.items.filter(x=>x.amt>0);
  const items=all.slice(0,topN);
  if(!items.length){alert('жӯӨзҜ„еңҚе°ҡз„ЎжҘӯзёҫиіҮж–ҷпјҢз„Ўжі•еҮәең–');return;}
  const W=1080, rowH=132, headH=470, footH=110;
  const H=Math.max(1350, headH+items.length*rowH+footH+40);
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  // иғҢжҷҜ
  let g=ctx.createLinearGradient(0,0,W*0.4,H);g.addColorStop(0,'#1B2A4A');g.addColorStop(.55,'#2E4A7A');g.addColorStop(1,'#1B2A4A');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(201,168,76,.45)';ctx.lineWidth=2;rr2(ctx,40,40,W-80,H-80,18);ctx.stroke();
  ctx.textAlign='center';
  ctx.fillStyle='#E8E0D0';ctx.font='34px '+SANS;ctx.fillText('иәҚеӢҮжҘӯзҷјзө„',W/2,160);
  ctx.fillStyle='#fff';ctx.font='900 76px '+SERIF;ctx.fillText(lastRank.title,W/2,260);
  ctx.fillStyle='#C9A84C';ctx.font='500 32px '+SANS;ctx.fillText(filterLabel(),W/2,330);
  ctx.strokeStyle='#C9A84C';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(W/2-75,375);ctx.lineTo(W/2+75,375);ctx.stroke();
  // иЎЁй ӯ
  const left=80,right=W-80,tableW=right-left;
  const colAmt=left+tableW*0.74, colCnt=left+tableW*0.93;
  ctx.font='28px '+SANS;ctx.fillStyle='#9fb6d8';
  ctx.textAlign='left';ctx.fillText('еҗҚж¬Ў / е§“еҗҚ',left+120,440);
  ctx.textAlign='center';ctx.fillText('FYC йҮ‘йЎҚ',colAmt,440);ctx.fillText('д»¶ж•ё',colCnt,440);
  // еҲ—
  const medals=['рҹҘҮ','рҹҘҲ','рҹҘү'];
  let yy=headH;
  items.forEach((it,i)=>{
    const top3=i<3;
    ctx.fillStyle= top3?'rgba(201,168,76,.16)':'rgba(250,246,238,.06)';
    rr2(ctx,left,yy,tableW,rowH-16,14);ctx.fill();
    ctx.fillStyle= i===0?'#FFD24A':i===1?'#D8D8D8':i===2?'#E0995A':'#C9A84C';
    rr2(ctx,left,yy,9,rowH-16,5);ctx.fill();
    const midY=yy+(rowH-16)/2;ctx.textBaseline='middle';
    // еҗҚж¬Ў/зҚҺзүҢ
    ctx.textAlign='center';
    if(top3){ctx.font='52px '+SANS;ctx.fillText(medals[i],left+58,midY);}
    else{ctx.fillStyle='#9fb0cc';ctx.font='900 44px '+SERIF;ctx.fillText(String(i+1),left+58,midY);}
    // е§“еҗҚ+еҚҖзө„
    ctx.textAlign='left';ctx.fillStyle='#FAF6EE';ctx.font='700 48px '+SANS;ctx.fillText(it.name,left+120,midY-14);
    ctx.fillStyle='#9fb0cc';ctx.font='26px '+SANS;ctx.fillText(it.sub,left+120,midY+30);
    // йҮ‘йЎҚ
    ctx.textAlign='center';ctx.fillStyle='#C9A84C';ctx.font='900 46px '+SERIF;ctx.fillText(it.amt.toLocaleString(),colAmt,midY);
    // д»¶ж•ё
    ctx.fillStyle='#9fc4ff';ctx.font='700 40px '+SERIF;ctx.fillText(String(it.cnt),colCnt,midY);
    ctx.textBaseline='alphabetic';
    yy+=rowH;
  });
  // еҗҲиЁҲ
  const tA=items.reduce((s,x)=>s+x.amt,0), tC=items.reduce((s,x)=>s+x.cnt,0);
  let tg=ctx.createLinearGradient(left,0,right,0);tg.addColorStop(0,'#C9A84C');tg.addColorStop(1,'#A07830');
  ctx.fillStyle=tg;rr2(ctx,left,yy,tableW,96,14);ctx.fill();
  const mY=yy+48;ctx.textBaseline='middle';ctx.fillStyle='#1B2A4A';
  ctx.textAlign='left';ctx.font='900 42px '+SANS;ctx.fillText('еҗҲиЁҲ',left+40,mY);
  ctx.textAlign='center';ctx.font='900 46px '+SERIF;ctx.fillText(tA.toLocaleString(),colAmt,mY);
  ctx.font='900 40px '+SERIF;ctx.fillText(String(tC),colCnt,mY);ctx.textBaseline='alphabetic';
  // й Ғе°ҫ
  ctx.textAlign='center';ctx.fillStyle='#C9A84C';ctx.font='32px '+SERIF;ctx.fillText('йҪҠеҝғ В· иЎқеҲә В· е…ұжҰ®',W/2,H-58);
  // ијёеҮә
  const url=cv.toDataURL('image/png');
  document.getElementById('rankResult').innerHTML='<img src="'+url+'" alt="жҺ’еҗҚең–"><div class="tip">вҶ‘ й•·жҢүйҖҷејөең– вҶ’ еҠ е…Ҙз…§зүҮ / е„ІеӯҳеҪұеғҸ</div>';
}
